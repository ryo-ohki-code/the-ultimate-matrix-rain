<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ULTIMATE MATRIX RAIN</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Courier New', monospace;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
        }

        #boot-sequence {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #0f0;
            font-size: 14px;
            text-align: center;
            z-index: 100;
            transition: opacity 0.3s ease-out;
            pointer-events: none;
            text-shadow: 0 0 5px #0f0;
        }

        .overlay {
            position: absolute;
            bottom: 20px;
            right: 20px;
            color: rgba(0, 255, 100, 0.5);
            font-size: 12px;
            z-index: 10;
            text-align: right;
            pointer-events: none;
        }

        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
            background-size: 100% 4px;
            z-index: 20;
            pointer-events: none;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>

<body>
    <div class="scanlines"></div>
    <div id="boot-sequence">LOADING THE MATRIX...<br>[ FRONT LAYER OVERRIDE ]</div>
    <div class="overlay">
        MATRIX RAIN V3<br>
        BY RYO OHKI CODE
        <br>
        RENDER: 2.5D WEBGL
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // --- V4.2 MACRO SETTINGS ---
        const CONFIG = {
            layers: 8,
            volumeHeight: 1200, 

            // The user's requested Font Sizing Logic
            frontLayerSize: 250.0,
            sizeRatio: 0.6,
            frontOpacity: 0.1,

            // --- NEW: SPEED CONTROLLERS ---
            baseDropSpeed: 380.0, // Speed of the giant front layer (Default was ~220)
            speedParallax: 45.0,  // How much slower each subsequent background layer falls

            bloomStrength: 2.2,
            bloomRadius: 0.5,
            bloomThreshold: 0.15
        };

        function createTextAtlas() {
            const canvas = document.createElement('canvas');
            canvas.width = 1024; canvas.height = 1024;
            const ctx = canvas.getContext('2d', { alpha: false });
            const gridSize = 16;
            const cellSize = canvas.width / gridSize;
            const chars = 'ﾊﾋﾌﾍﾎﾏﾐﾑﾒﾓﾔﾕﾖﾗﾘﾙﾚﾛﾜﾝｱｲｳｴｵｶｷｸｹｺｻｼｽｾｿﾀﾁﾂﾃﾄ0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');

            ctx.fillStyle = '#000000'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#FFFFFF';
            ctx.font = `bold ${cellSize * 0.8}px monospace`;
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

            for (let i = 0; i < gridSize * gridSize; i++) {
                const x = (i % gridSize) * cellSize + cellSize / 2;
                const y = Math.floor(i / gridSize) * cellSize + cellSize / 2;
                ctx.fillText(chars[Math.floor(Math.random() * chars.length)], x, y);
            }

            const texture = new THREE.CanvasTexture(canvas);
            texture.minFilter = THREE.LinearMipMapLinearFilter;
            return texture;
        }

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 2000);
        camera.position.set(0, 0, 400);

        const MAX_PAN_Y = 20;
        const farthestDist = camera.position.z + (CONFIG.layers - 1) * 150;
        const visibleHeightAtBack = 2 * farthestDist * Math.tan(THREE.MathUtils.degToRad(camera.fov / 2));
        CONFIG.volumeHeight = visibleHeightAtBack * 1.1 + MAX_PAN_Y * 2;

        const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
        document.body.appendChild(renderer.domElement);

        const material = new THREE.ShaderMaterial({
            uniforms: {
                uTime: { value: 0.0 },
                uTexture: { value: createTextAtlas() },
                uVolumeHeight: { value: CONFIG.volumeHeight },
                uFrontOpacity: { value: CONFIG.frontOpacity },
                uGlitch: { value: 0.0 },
                uGlitchPos: { value: new THREE.Vector2(0, 0) }
            },
            vertexShader: `
                attribute float charIndex;
                attribute vec3 dropData; 
                attribute float aSize; // Explicit size attribute passed from JS
                
                uniform float uTime;
                uniform float uGlitch;
                uniform vec2 uGlitchPos;
                
                varying float vCharIndex;
                varying vec3 vDropData;
                varying vec3 vPos;
                varying float vGlitch;
                
                void main() {
                    vCharIndex = charIndex; 
                    vDropData = dropData; 
                    vPos = position;
                    
                    // --- GLITCH: intensité locale (forte près du point touché, faible ailleurs) ---
                    float d = distance(position.xy, uGlitchPos);
                    vGlitch = uGlitch * (0.2 + 0.8 * smoothstep(600.0, 0.0, d));
                    
                    // Déchirure horizontale par bandes (screen tear)
                    vec3 pos = position;
                    float band = floor(position.y / 45.0);
                    float tear = fract(sin(band * 91.7 + floor(uTime * 24.0) * 13.3) * 43758.5453) - 0.5;
                    pos.x += tear * 90.0 * vGlitch;
                    
                    vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
                    gl_Position = projectionMatrix * mvPosition;
                    
                    // We remove WebGL perspective scaling completely.
                    // The particle size is now STRICTLY controlled by your ratio settings in JS!
                    gl_PointSize = aSize; 
                }
            `,
            fragmentShader: `
                uniform sampler2D uTexture; 
                uniform float uTime; 
                uniform float uVolumeHeight;
                uniform float uFrontOpacity;
                
                varying float vCharIndex; 
                varying vec3 vDropData; 
                varying vec3 vPos;
                varying float vGlitch;
                
                void main() {
                    vec2 ptUV = gl_PointCoord; 
                    float cols = 16.0; 
                    float charIdx = vCharIndex;
                    
                    if (sin(uTime * 15.0 + vPos.x) > 0.95) {
                        charIdx = mod(charIdx + floor(uTime * 30.0), 256.0);
                    }
                    
                    // --- GLITCH: brouillage frénétique des caractères touchés ---
                    if (vGlitch > 0.02) {
                        float r = fract(sin(vPos.x * 12.9898 + vPos.y * 78.233) * 43758.5453);
                        if (r < vGlitch) {
                            charIdx = mod(charIdx + floor(uTime * 120.0) + vPos.y, 256.0);
                        }
                    }

                    float row = floor(charIdx / cols); 
                    float col = mod(charIdx, cols);
                    vec2 uv = vec2((col + ptUV.x) / cols, 1.0 - (row + ptUV.y) / cols);
                    vec4 texColor = texture2D(uTexture, uv);
                    
                    if (texColor.r < 0.3) discard; 
                    
                    float speed = vDropData.x; 
                    float offset = vDropData.y;
                    float layer = vDropData.z;
                    
                    float headY = (uVolumeHeight / 2.0) - mod(uTime * speed + offset, uVolumeHeight);
                    float dist = headY - vPos.y;
                    if (dist < -50.0) dist += uVolumeHeight; 
                    
                    vec3 color = vec3(0.0); 
                    float alpha = 0.0;
                    
                    if (dist >= 0.0 && dist < 450.0) {
                        alpha = smoothstep(450.0, 0.0, dist);
                        
                        if (dist < 12.0) { 
                            color = vec3(0.9, 1.0, 0.95) * 1.8; 
                        } else if (dist < 120.0) { 
                            color = mix(vec3(0.1, 1.0, 0.5), vec3(0.0, 0.7, 0.2), dist / 120.0); 
                        } else { 
                            color = vec3(0.0, 0.4, 0.1) * alpha; 
                        }
                    } else { 
                        discard; 
                    }
                    
                    // --- YOUR OPACITY LOGIC ---
                    if (layer < 0.5) {
                        // The giant front layer gets reduced opacity
                        alpha *= uFrontOpacity;
                    } else {
                        // Background layers fade normally
                        alpha *= (1.0 - (layer * 0.15));
                    }

                    // --- GLITCH: flash de couleur corrompue (bandes rouge/blanc clignotantes) ---
                    if (vGlitch > 0.02) {
                        float flicker = step(0.5, fract(uTime * 18.0 + vPos.y * 0.02));
                        color = mix(color, vec3(1.0, 0.25, 0.35) * 1.5, vGlitch * 0.6 * flicker);
                        alpha = min(1.0, alpha + vGlitch * 0.3 * flicker);
                    }

                    gl_FragColor = vec4(color * texColor.r, alpha);
                }
            `,
            transparent: true, depthWrite: false, blending: THREE.AdditiveBlending
        });

        // Pre-calculate how many particles we need based on your font sizes
        let totalParticles = 0;
        const layerData = [];

        for (let layer = 0; layer < CONFIG.layers; layer++) {
            const pixelSize = CONFIG.frontLayerSize * Math.pow(CONFIG.sizeRatio, layer);

            // 1. Calculate the wide responsive spread FIRST
            const spreadX = window.innerWidth * 1.8 + (layer * 300);

            // 2. Calculate columns based on the REAL spreadX, not the hardcoded 1800!
            const cols = Math.max(5, Math.floor(spreadX / (pixelSize * 0.8)));
            const drops = Math.max(20, Math.floor(CONFIG.volumeHeight / (pixelSize * 0.8)));

            layerData.push({ layer, pixelSize, cols, drops, spreadX });
            totalParticles += (cols * drops);
        }

        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(totalParticles * 3);
        const charIndices = new Float32Array(totalParticles);
        const dropData = new Float32Array(totalParticles * 3);
        const sizes = new Float32Array(totalParticles);

        let idx = 0;

        // Build the layers dynamically
        layerData.forEach(ld => {
            const z = -ld.layer * 150;

            // We use the spreadX we calculated in the first loop
            const baseSpeed = Math.max(20.0, CONFIG.baseDropSpeed - (ld.layer * CONFIG.speedParallax));

            for (let col = 0; col < ld.cols; col++) {
                // Use ld.spreadX here!
                const x = (Math.random() - 0.5) * ld.spreadX;
                const speed = baseSpeed + (Math.random() * 25.0);
                const offset = Math.random() * 5000.0;

                for (let drop = 0; drop < ld.drops; drop++) {
                    const y = (drop / ld.drops) * CONFIG.volumeHeight - (CONFIG.volumeHeight / 2);

                    positions[idx * 3] = x;
                    positions[idx * 3 + 1] = y;
                    positions[idx * 3 + 2] = z;

                    charIndices[idx] = Math.floor(Math.random() * 256);
                    sizes[idx] = ld.pixelSize;

                    dropData[idx * 3] = speed;
                    dropData[idx * 3 + 1] = offset;
                    dropData[idx * 3 + 2] = ld.layer;

                    idx++;
                }
            }
        });

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('charIndex', new THREE.BufferAttribute(charIndices, 1));
        geometry.setAttribute('dropData', new THREE.BufferAttribute(dropData, 3));
        geometry.setAttribute('aSize', new THREE.BufferAttribute(sizes, 1));

        const particleSystem = new THREE.Points(geometry, material);
        scene.add(particleSystem);

        const composer = new EffectComposer(renderer);
        composer.addPass(new RenderPass(scene, camera));

        const bloomPass = new UnrealBloomPass(
            new THREE.Vector2(window.innerWidth, window.innerHeight),
            CONFIG.bloomStrength, CONFIG.bloomRadius, CONFIG.bloomThreshold
        );
        composer.addPass(bloomPass);

        // --- NEW: CINEMATIC MOUSE SWAY (WITH EDGE CLAMPING) ---
        const mouse = new THREE.Vector2(0, 0);
        const targetMouse = new THREE.Vector2(0, 0);
        const windowHalfX = window.innerWidth / 2;
        const windowHalfY = window.innerHeight / 2;

        // Set maximum travel limits for the camera
        // const maxPanX = 120; // Allow decent horizontal panning
        const maxPanX = 85; // Tightened to prevent seeing the responsive edges
        const maxPanY = 20;  // STRICTLY limit vertical tilt to hide the spawners

        document.addEventListener('mousemove', (event) => {
            // Calculate the raw intended movement
            let rawX = (event.clientX - windowHalfX) * 0.15;
            let rawY = (event.clientY - windowHalfY) * 0.15;

            // Clamp the X and Y coordinates so they cannot exceed our safe limits
            targetMouse.x = Math.max(-maxPanX, Math.min(maxPanX, rawX));
            targetMouse.y = Math.max(-maxPanY, Math.min(maxPanY, rawY));
        });

        // --- NEW: TOUCH SLIDE (mobile) ---
        let lastTouch = null;
        document.addEventListener('touchstart', (event) => {
            const t = event.touches[0];
            lastTouch = { x: t.clientX, y: t.clientY };
        }, { passive: false });

        document.addEventListener('touchmove', (event) => {
            event.preventDefault();
            if (!lastTouch) return;
            const t = event.touches[0];
            const dx = t.clientX - lastTouch.x;
            const dy = t.clientY - lastTouch.y;
            lastTouch = { x: t.clientX, y: t.clientY };

            targetMouse.x = Math.max(-maxPanX, Math.min(maxPanX, targetMouse.x - dx * 0.35));
            targetMouse.y = Math.max(-maxPanY, Math.min(maxPanY, targetMouse.y - dy * 0.35));
        }, { passive: false });

        document.addEventListener('touchend', () => { lastTouch = null; });

        // --- NEW: GLITCH ON CLICK / TAP ---
        let glitchStrength = 0.0;
        const glitchWorldPos = new THREE.Vector2(0, 0);

        function triggerGlitch(clientX, clientY) {
            glitchStrength = 1.0;

            const ndc = new THREE.Vector3(
                (clientX / window.innerWidth) * 2 - 1,
                -(clientY / window.innerHeight) * 2 + 1,
                0.5
            );
            ndc.unproject(camera);
            const dir = ndc.sub(camera.position).normalize();
            const t = -camera.position.z / dir.z;
            glitchWorldPos.set(
                camera.position.x + dir.x * t,
                camera.position.y + dir.y * t
            );
            material.uniforms.uGlitchPos.value.copy(glitchWorldPos);
        }

        document.addEventListener('pointerdown', (event) => {
            triggerGlitch(event.clientX, event.clientY);
        });
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });

        setTimeout(() => {
            const boot = document.getElementById('boot-sequence');
            if (boot) { boot.style.opacity = 0; setTimeout(() => boot.remove(), 300); }
        }, 600);

        const clock = new THREE.Clock();
        let prevTime = 0;
        function animate() {
            requestAnimationFrame(animate);
            const elapsed = clock.getElapsedTime();
            const delta = elapsed - prevTime;
            prevTime = elapsed;
            material.uniforms.uTime.value = elapsed;

            if (glitchStrength > 0.0) {
                glitchStrength = Math.max(0.0, glitchStrength - delta * 2.2);
                material.uniforms.uGlitch.value = glitchStrength;
            }

            // --- NEW: Apply the smooth camera sway ---
            // The * 0.05 creates that heavy, cinematic "lazy" camera feel
            mouse.x += (targetMouse.x - mouse.x) * 0.05;
            mouse.y += (targetMouse.y - mouse.y) * 0.05;

            camera.position.x = mouse.x;
            camera.position.y = -mouse.y; // Inverted so it feels natural

            // Keep the lens focused on the center of the 3D volume
            camera.lookAt(scene.position);

            composer.render();
        }
        animate();
    </script>
</body>

</html>
