<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE ULTIMATE MATRIX RAIN V6</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Courier New', monospace;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
        }

        #matrix1 {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        #boot-sequence {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #0f0;
            font-size: 14px;
            text-align: center;
            z-index: 100;
            transition: opacity 0.3s ease-out;
            pointer-events: none;
            text-shadow: 0 0 5px #0f0;
        }

        .overlay {
            position: absolute;
            bottom: 20px;
            right: 20px;
            color: rgba(0, 255, 100, 0.5);
            font-size: 12px;
            z-index: 10;
            text-align: right;
            pointer-events: none;
        }

        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
            background-size: 100% 4px;
            z-index: 20;
            pointer-events: none;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>

<body>
    <div id="matrix1"></div>

    <div class="scanlines"></div>
    <div id="boot-sequence">LOADING MATRIX<br>[ DOUBLE-TAP TO WARP ]</div>
    <div class="overlay">
        MATRIX RAIN V6<br>
        RYO OHKI CODE<br>
        RENDER: 2.5D WEBGL
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        class MatrixRain {
            constructor(containerId, options = {}) {
                this.container = document.getElementById(containerId);

                if (!this.container) throw new Error(`Container #${containerId} not found.`);

                this.config = {
                    layers: 8,
                    volumeHeight: 1200,
                    frontLayerSize: 250,
                    sizeRatio: 0.6,
                    frontOpacity: 0.1,
                    matrixColor: 0x44ff88,
                    tailLength: 25,
                    tailParallax: 0.5,
                    tailFade: 1,
                    repositionDrops: true,
                    charRerollRate: 1.0,
                    enableMoveFX: true,
                    enableClickFX: true,
                    baseDropSpeed: 250,
                    speedParallax: 45,
                    bloomStrength: 2.2,
                    bloomRadius: 0.5,
                    bloomThreshold: 0.15,
                    bloomGradientSize: 0.6,

                    maxPanX: 85,
                    maxPanY: 20,

                    errorRate: 0.001,
                    errorRateGlitchingChar: 0.5,
                    partialErrorRate: 0.0001,
                    partialErrorSize: 0.4,
                    errorColor: 0xff0000,

                    decryptColor: 0xffffff,
                    decryptStrength: 1.5,
                    decryptMix: 0.8,
                    decryptFlashSize: 0.2,
                    decryptScrambleSize: 1.5,

                    destructColor: 0xffffff,
                    destructStrength: 1.8,
                    destructMix: 0.8,
                    destructFlashSize: 1.5,
                    destructAlphaBoost: 0.8,

                    layerRainPerc: 1,
                    layerDensityRamp: 1,

                    repulsionRadius: 20,
                    repulsionDepth: 2.5,
                    ...options
                };

                if (options.gradientSize !== undefined && options.bloomGradientSize === undefined) {
                    this.config.bloomGradientSize = options.gradientSize;
                }

                this.config.layerRainPerc = Math.min(1, Math.max(0, this.config.layerRainPerc));
                this.config.layerDensityRamp = Math.min(1, Math.max(0, this.config.layerDensityRamp));

                // Core State
                this.mouse = new THREE.Vector2(0, 0);
                this.targetMouse = new THREE.Vector2(0, 0);
                this.lastTouch = null;

                // Glitch & Warp State
                this.glitchStrength = 0.0;
                this.glitchWorldPos = new THREE.Vector2(0, 0);
                this.lastClickTime = 0;
                this.baseFOV = 60;
                this.targetFOV = 60;

                this.animate = this.animate.bind(this);
                this.init();
            }

            init() {
                this.width = this.container.clientWidth || window.innerWidth;
                this.height = this.container.clientHeight || window.innerHeight;

                this.scene = new THREE.Scene();
                this.camera = new THREE.PerspectiveCamera(this.baseFOV, this.width / this.height, 1, 2000);
                this.camera.position.set(0, 0, 400);

                const farthestDist = this.camera.position.z + (this.config.layers - 1) * 150;
                const visibleHeightAtBack = 2 * farthestDist * Math.tan(THREE.MathUtils.degToRad(this.camera.fov / 2));
                this.config.volumeHeight = visibleHeightAtBack * 1.1 + this.config.maxPanY * 2;

                this.renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
                this.renderer.setSize(this.width, this.height);
                this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
                this.container.appendChild(this.renderer.domElement);

                this.buildSystem();
                this.setupPostProcessing();
                this.bindEvents();

                this.clock = new THREE.Clock();
                this.prevTime = 0;
                this.animate();
            }

            createTextAtlas() {
                const canvas = document.createElement('canvas');
                canvas.width = 1024; canvas.height = 1024;
                const ctx = canvas.getContext('2d', { alpha: false });
                const gridSize = 16;
                const cellSize = canvas.width / gridSize;
                const chars = 'ﾊﾋﾌﾍﾎﾏﾐﾑﾒﾓﾔﾕﾖﾗﾘﾙﾚﾛﾜﾝｱｲｳｴｵｶｷｸｹｺｻｼｽｾｿﾀﾁﾂﾃﾄ0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');

                ctx.fillStyle = '#000000'; ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#FFFFFF';
                ctx.font = `bold ${cellSize * 0.8}px monospace`;
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

                for (let i = 0; i < gridSize * gridSize; i++) {
                    const x = (i % gridSize) * cellSize + cellSize / 2;
                    const y = Math.floor(i / gridSize) * cellSize + cellSize / 2;
                    ctx.fillText(chars[Math.floor(Math.random() * chars.length)], x, y);
                }

                const texture = new THREE.CanvasTexture(canvas);
                texture.minFilter = THREE.LinearMipMapLinearFilter;
                return texture;
            }

            buildSystem() {
                this.material = new THREE.ShaderMaterial({
                    uniforms: {
                        uTime: { value: 0.0 },
                        uTexture: { value: this.createTextAtlas() },
                        uVolumeHeight: { value: this.config.volumeHeight },
                        uFrontOpacity: { value: this.config.frontOpacity },
                        uGlitch: { value: 0.0 },
                        uGlitchPos: { value: new THREE.Vector2(0, 0) },
                        uTailLength: { value: this.config.tailLength },
                        uSizeRatio: { value: this.config.sizeRatio },
                        uTailParallax: { value: this.config.tailParallax },
                        uColor: { value: new THREE.Color(this.config.matrixColor) },
                        uSpreadBase: { value: this.width * 1.8 },
                        uReposition: { value: this.config.repositionDrops ? 1.0 : 0.0 },
                        uCharRerollRate: { value: this.config.charRerollRate },
                        uMouseWorld: { value: new THREE.Vector2(0, 0) },
                        uRepulsionRadius: { value: this.config.repulsionRadius },
                        uRepulsionDepth: { value: this.config.repulsionDepth },
                        uErrorRate: { value: this.config.errorRate },
                        uErrorRateGlitchingChar: { value: this.config.errorRateGlitchingChar },
                        uPartialErrorRate: { value: this.config.partialErrorRate },
                        uPartialErrorSize: { value: this.config.partialErrorSize },
                        uBloomGradientSize: { value: this.config.bloomGradientSize },
                        uTailFade: { value: this.config.tailFade },
                        uErrorColor: { value: new THREE.Color(this.config.errorColor) },
                        uDecryptColor: { value: new THREE.Color(this.config.decryptColor) },
                        uDecryptStrength: { value: this.config.decryptStrength },
                        uDecryptMix: { value: this.config.decryptMix },
                        uDecryptFlashSize: { value: this.config.decryptFlashSize },
                        uDecryptScrambleSize: { value: this.config.decryptScrambleSize },
                        uDestructColor: { value: new THREE.Color(this.config.destructColor) },
                        uDestructStrength: { value: this.config.destructStrength },
                        uDestructMix: { value: this.config.destructMix },
                        uDestructFlashSize: { value: this.config.destructFlashSize },
                        uDestructAlphaBoost: { value: this.config.destructAlphaBoost },
                        uRainPerc: { value: this.config.layerRainPerc }
                    },
                    vertexShader: `
                        attribute float charIndex;
                        attribute vec3 dropData; 
                        attribute float aSize; 
                        attribute vec2 aSlot;
                        
                        uniform float uTime;
                        uniform float uGlitch;
                        uniform vec2 uGlitchPos;
                        uniform float uVolumeHeight;
                        uniform float uSpreadBase;
                        uniform float uReposition;
                        uniform float uCharRerollRate;
                        uniform vec2 uMouseWorld;
                        uniform float uRepulsionRadius;
                        uniform float uRepulsionDepth;
                        uniform float uRainPerc;
                        
                        varying float vCharIndex;
                        varying vec3 vDropData;
                        varying vec3 vPos;
                        varying float vGlitch;
                        varying float vSize;
                        varying float vActive;
                        
                        void main() {
                            float T = uTime * dropData.x + dropData.y;
                            float lap = floor((T - uVolumeHeight * 0.5 + position.y) / uVolumeHeight);
                            
                            float phase = fract(sin(position.x * 0.913 + position.y * 0.527 + position.z * 0.311) * 43758.5453);
                            float effLap = floor((lap + phase) * uCharRerollRate);
                            float reroll = fract(sin(effLap * 12.9898 + position.x * 0.731 + position.y * 0.517) * 43758.5453);
                            vCharIndex = mod(charIndex + floor(reroll * 256.0), 256.0);
                            
                            vec3 pos = position;
                            float colSeed = position.x * 0.0173 + position.z * 0.31;
                            float rerollX = fract(sin(dot(vec2(lap, colSeed), vec2(12.9898, 78.233))) * 43758.5453);
                            float spread = uSpreadBase + dropData.z * 300.0;
                            
                            float slotW = spread / aSlot.y;
                            float slotX = (aSlot.x + 0.5 + (rerollX - 0.5) * 0.7) * slotW - spread * 0.5;
                            pos.x = mix(position.x, slotX, uReposition);
                            
                            float rainRoll = fract(sin(dot(vec2(lap, colSeed), vec2(45.164, 94.673))) * 43758.5453);
                            vActive = step(rainRoll, uRainPerc);
                            
                            vDropData = dropData; 
                            vPos = position;
                            vSize = aSize;
                            
                            // 1. Click Glitch Logic
                            float d = distance(pos.xy, uGlitchPos);
                            vGlitch = uGlitch * (0.2 + 0.8 * smoothstep(600.0, 0.0, d));
                            
                            float band = floor(position.y / 45.0);
                            float tear = fract(sin(band * 91.7 + floor(uTime * 24.0) * 13.3) * 43758.5453) - 0.5;
                            pos.x += tear * 90.0 * vGlitch;
                            
                            // 2. UPDATED: Depth-Aware Fluid Repulsion
                            float layer = dropData.z;
                            // Calculates a smooth fade: 1.0 at front layer, 0.0 at layer index > uRepulsionDepth
                            float depthFactor = 1.0 - smoothstep(0.0, uRepulsionDepth, layer);
                            
                            float distToMouse = distance(pos.xy, uMouseWorld);
                            // Multiply the original repulsion by the depth factor
                            float repulsion = smoothstep(uRepulsionRadius, 0.0, distToMouse) * depthFactor;
                            
                            pos.x += sign(pos.x - uMouseWorld.x) * repulsion * 35.0;
                            pos.y += sign(pos.y - uMouseWorld.y) * repulsion * 35.0;
                            
                            vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
                            gl_Position = projectionMatrix * mvPosition;
                            gl_PointSize = aSize;
                        }
                    `,
                    fragmentShader: `
                        uniform sampler2D uTexture; 
                        uniform float uTime; 
                        uniform float uVolumeHeight;
                        uniform float uFrontOpacity;
                        uniform float uTailLength;
                        uniform float uSizeRatio;
                        uniform float uTailParallax;
                        uniform vec3 uColor;
                        uniform vec3 uErrorColor;
                        uniform float uErrorRate;
                        uniform float uErrorRateGlitchingChar;
                        uniform float uPartialErrorRate;
                        uniform float uPartialErrorSize;
                        uniform float uBloomGradientSize;
                        uniform float uTailFade;
                        uniform vec3 uDecryptColor;
                        uniform float uDecryptStrength;
                        uniform float uDecryptMix;
                        uniform float uDecryptFlashSize;
                        uniform float uDecryptScrambleSize;
                        uniform vec3 uDestructColor;
                        uniform float uDestructStrength;
                        uniform float uDestructMix;
                        uniform float uDestructFlashSize;
                        uniform float uDestructAlphaBoost;

                        varying float vCharIndex; 
                        varying vec3 vDropData; 
                        varying vec3 vPos;
                        varying float vGlitch;
                        varying float vSize;
                        varying float vActive;
                        
                        void main() {
                            if (vActive < 0.5) discard;
                            vec2 ptUV = gl_PointCoord; 
                            float cols = 16.0; 
                            float charIdx = vCharIndex;
                            
                            // Matrix Error Seeds
                            float colSeed = fract(sin(vDropData.y * 12.9898) * 43758.5453);
                            bool isTotalError = colSeed < uErrorRate;
                            bool isPartialError = colSeed > uErrorRate && colSeed < (uErrorRate + uPartialErrorRate);
                            float partialGlitch = 0.0;
                            
                            float speed = vDropData.x; 
                            float offset = vDropData.y;
                            float layer = vDropData.z;
                            
                            float headY = (uVolumeHeight / 2.0) - mod(uTime * speed + offset, uVolumeHeight);
                            
                            // Tail stretches UPWARDS above the head
                            float dist = vPos.y - headY; 
                            if (dist < -50.0) dist += uVolumeHeight; 
                            
                            float tailBoost = pow(uSizeRatio, -layer * uTailParallax);
                            float physicalTail = vSize * uTailLength * tailBoost;
                            physicalTail = min(physicalTail, uVolumeHeight * 0.7);
                            
                            // --- 1. DECRYPTING HEAD SCRAMBLE ---
                            if (dist >= 0.0 && dist < vSize * uDecryptScrambleSize) {
                                charIdx = mod(charIdx + floor(uTime * 60.0), 256.0);
                            }
                            
                            // 2. Matrix Errors
                            if (isTotalError) {
                                float charSeed = fract(sin(vPos.y * 12.9898 + colSeed * 78.233) * 43758.5453);
                                if (charSeed < uErrorRateGlitchingChar) {
                                    charIdx = mod(charIdx + floor(uTime * 80.0), 256.0);
                                }
                            }
                            if (isPartialError) {
                                float repairPulse = fract(uTime * 0.3 + colSeed * 10.0);
                                float normDist = dist / physicalTail;
                                if (abs(normDist - repairPulse) < (uPartialErrorSize * 0.5)) {
                                    partialGlitch = 1.0;
                                    charIdx = mod(charIdx + floor(uTime * 80.0), 256.0);
                                }
                            }

                            // if (sin(uTime * 15.0 + vPos.x) > 0.95) {
                            //     charIdx = mod(charIdx + floor(uTime * 30.0), 256.0);
                            // }
                            
                            if (vGlitch > 0.02) {
                                float r = fract(sin(vPos.x * 12.9898 + vPos.y * 78.233) * 43758.5453);
                                if (r < vGlitch) { charIdx = mod(charIdx + floor(uTime * 120.0) + vPos.y, 256.0); }
                            }

                            float row = floor(charIdx / cols); 
                            float col = mod(charIdx, cols);
                            vec2 uv = vec2((col + ptUV.x) / cols, 1.0 - (row + ptUV.y) / cols);
                            vec4 texColor = texture2D(uTexture, uv);
                            
                            if (texColor.r < 0.3) discard; 
                            
                            vec3 activeColor = uColor;
                            if (isTotalError) activeColor = uErrorColor;
                            if (partialGlitch > 0.0) activeColor = mix(uColor, uErrorColor, 0.85);

                            vec3 color = vec3(0.0); 
                            float alpha = 0.0;
                            
                            float headLength = vSize * uDecryptFlashSize;           
                            float destroyLength = vSize * uDestructFlashSize;
                            
                            if (dist >= 0.0 && dist < physicalTail) {
                                float solidAlpha = smoothstep(physicalTail, physicalTail - (vSize * 2.0), dist);
                                float fadedAlpha = smoothstep(physicalTail, 0.0, dist);
                                alpha = mix(solidAlpha, fadedAlpha, uTailFade);
                                
                                if (dist < headLength) { 
                                    color = mix(activeColor, uDecryptColor, uDecryptMix) * uDecryptStrength; 
                                } 
                                else { 
                                    float fadeFactor = clamp(dist / (physicalTail * uBloomGradientSize), 0.0, 1.0);
                                    color = mix(activeColor, activeColor * 0.15, fadeFactor); 
                                }
                                
                                float tailEndDist = physicalTail - dist;
                                if (tailEndDist > 0.0 && tailEndDist < destroyLength) {
                                    float destroyFade = 1.0 - (tailEndDist / destroyLength);
                                    vec3 flashColor = mix(activeColor, uDestructColor, uDestructMix) * uDestructStrength;
                                    color = mix(color, flashColor, destroyFade * destroyFade);
                                    
                                    alpha = max(alpha, destroyFade * uDestructAlphaBoost);
                                }
                            } else { 
                                discard; 
                            }
                            
                            if (layer < 0.5) { alpha *= uFrontOpacity; } 
                            else { alpha *= (1.0 - (layer * 0.15)); }

                            if (vGlitch > 0.02) {
                                float flicker = step(0.5, fract(uTime * 18.0 + vPos.y * 0.02));
                                color = mix(color, vec3(1.0, 0.25, 0.35) * 1.5, vGlitch * 0.6 * flicker);
                                alpha = min(1.0, alpha + vGlitch * 0.3 * flicker);
                            }

                            gl_FragColor = vec4(color * texColor.r, alpha);
                        }
                    `,
                    transparent: true, depthWrite: false, blending: THREE.AdditiveBlending
                });

                let totalParticles = 0;
                const layerData = [];

                const colsFlat = Math.max(5, Math.floor((this.width * 1.8) / (this.config.frontLayerSize * 0.8)));
                const rampT = this.config.layerDensityRamp;

                for (let layer = 0; layer < this.config.layers; layer++) {
                    const pixelSize = this.config.frontLayerSize * Math.pow(this.config.sizeRatio, layer);
                    const spreadX = this.width * 1.8 + (layer * 300);
                    let cols = Math.max(5, Math.floor(spreadX / (pixelSize * 0.8)));
                    const drops = Math.max(20, Math.floor(this.config.volumeHeight / (pixelSize * 0.8)));

                    if (layer === this.config.layers - 1) {
                        const depth = 400 + layer * 150;
                        const worldPerPx = (2 * depth * Math.tan(THREE.MathUtils.degToRad(this.baseFOV / 2))) / this.height;
                        const glyphWorld = pixelSize * worldPerPx;
                        cols = Math.max(cols, Math.ceil(spreadX / (glyphWorld * 0.9)));
                    }

                    cols = Math.max(5, Math.round(colsFlat * Math.pow(cols / colsFlat, rampT)));

                    layerData.push({ layer, pixelSize, cols, drops, spreadX });
                    totalParticles += (cols * drops);
                }

                const geometry = new THREE.BufferGeometry();
                const positions = new Float32Array(totalParticles * 3);
                const charIndices = new Float32Array(totalParticles);
                const dropData = new Float32Array(totalParticles * 3);
                const sizes = new Float32Array(totalParticles);
                const slots = new Float32Array(totalParticles * 2);

                let idx = 0;

                layerData.forEach(ld => {
                    const z = -ld.layer * 150;
                    const baseSpeed = Math.max(20.0, this.config.baseDropSpeed - (ld.layer * this.config.speedParallax));
                    const slotW = ld.spreadX / ld.cols;

                    for (let col = 0; col < ld.cols; col++) {
                        const x = (col + 0.5 + (Math.random() - 0.5) * 0.7) * slotW - ld.spreadX / 2;
                        const speed = baseSpeed + (Math.random() * 25.0);
                        const offset = Math.random() * 5000.0;

                        for (let drop = 0; drop < ld.drops; drop++) {
                            const y = (drop / ld.drops) * this.config.volumeHeight - (this.config.volumeHeight / 2);
                            positions[idx * 3] = x;
                            positions[idx * 3 + 1] = y;
                            positions[idx * 3 + 2] = z;
                            charIndices[idx] = Math.floor(Math.random() * 256);
                            sizes[idx] = ld.pixelSize;
                            dropData[idx * 3] = speed;
                            dropData[idx * 3 + 1] = offset;
                            dropData[idx * 3 + 2] = ld.layer;
                            slots[idx * 2] = col;
                            slots[idx * 2 + 1] = ld.cols;
                            idx++;
                        }
                    }
                });

                geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                geometry.setAttribute('charIndex', new THREE.BufferAttribute(charIndices, 1));
                geometry.setAttribute('dropData', new THREE.BufferAttribute(dropData, 3));
                geometry.setAttribute('aSize', new THREE.BufferAttribute(sizes, 1));
                geometry.setAttribute('aSlot', new THREE.BufferAttribute(slots, 2));

                this.scene.add(new THREE.Points(geometry, this.material));
            }

            setupPostProcessing() {
                this.composer = new EffectComposer(this.renderer);
                this.composer.addPass(new RenderPass(this.scene, this.camera));

                const bloomPass = new UnrealBloomPass(
                    new THREE.Vector2(this.width, this.height),
                    this.config.bloomStrength, this.config.bloomRadius, this.config.bloomThreshold
                );
                this.composer.addPass(bloomPass);
            }

            triggerGlitch(clientX, clientY) {
                this.glitchStrength = 1.0;

                // --- V5.0 DOUBLE CLICK WARP DETECTOR ---
                const now = performance.now();
                if (now - this.lastClickTime < 350) {
                    this.targetFOV = 25; // Trigger aggressive FOV tunnel warp
                    setTimeout(() => { this.targetFOV = this.baseFOV; }, 400); // Auto-recover
                }
                this.lastClickTime = now;

                // Project click to 3D space for local glitch shader
                const rect = this.container.getBoundingClientRect();
                const ndc = new THREE.Vector3(
                    ((clientX - rect.left) / rect.width) * 2 - 1,
                    -((clientY - rect.top) / rect.height) * 2 + 1,
                    0.5
                );

                ndc.unproject(this.camera);
                const dir = ndc.sub(this.camera.position).normalize();
                const t = -this.camera.position.z / dir.z;

                this.glitchWorldPos.set(
                    this.camera.position.x + dir.x * t,
                    this.camera.position.y + dir.y * t
                );
                this.material.uniforms.uGlitchPos.value.copy(this.glitchWorldPos);
            }

            bindEvents() {
                window.addEventListener('resize', () => {
                    this.width = this.container.clientWidth || window.innerWidth;
                    this.height = this.container.clientHeight || window.innerHeight;

                    this.camera.aspect = this.width / this.height;
                    this.camera.updateProjectionMatrix();
                    this.renderer.setSize(this.width, this.height);
                    this.composer.setSize(this.width, this.height);

                    this.material.uniforms.uSpreadBase.value = this.width * 1.8;
                });

                if (this.config.enableMoveFX) {
                    this.container.addEventListener('mousemove', (event) => {
                        const rect = this.container.getBoundingClientRect();
                        const windowHalfX = rect.width / 2;
                        const windowHalfY = rect.height / 2;

                        let rawX = (event.clientX - rect.left - windowHalfX) * 0.15;
                        let rawY = (event.clientY - rect.top - windowHalfY) * 0.15;

                        this.targetMouse.x = Math.max(-this.config.maxPanX, Math.min(this.config.maxPanX, rawX));
                        this.targetMouse.y = Math.max(-this.config.maxPanY, Math.min(this.config.maxPanY, rawY));

                        // Send 3D mouse position to shader for repulsion
                        const ndc = new THREE.Vector3(
                            ((event.clientX - rect.left) / rect.width) * 2 - 1,
                            -((event.clientY - rect.top) / rect.height) * 2 + 1,
                            0.5
                        );
                        ndc.unproject(this.camera);
                        const dir = ndc.sub(this.camera.position).normalize();
                        const t = -this.camera.position.z / dir.z;

                        this.material.uniforms.uMouseWorld.value.set(
                            this.camera.position.x + dir.x * t,
                            this.camera.position.y + dir.y * t
                        );

                    });

                    this.container.addEventListener('touchstart', (event) => {
                        const t = event.touches[0];
                        this.lastTouch = { x: t.clientX, y: t.clientY };
                    }, { passive: false });

                    this.container.addEventListener('touchmove', (event) => {
                        event.preventDefault();
                        if (!this.lastTouch) return;

                        const touch = event.touches[0];
                        const rect = this.container.getBoundingClientRect();

                        // Send 3D touch position to shader for repulsion
                        const ndc = new THREE.Vector3(
                            ((touch.clientX - rect.left) / rect.width) * 2 - 1,
                            -((touch.clientY - rect.top) / rect.height) * 2 + 1,
                            0.5
                        );
                        ndc.unproject(this.camera);
                        const dir = ndc.sub(this.camera.position).normalize();
                        const dist = -this.camera.position.z / dir.z;

                        this.material.uniforms.uMouseWorld.value.set(
                            this.camera.position.x + dir.x * dist,
                            this.camera.position.y + dir.y * dist
                        );

                        const dx = touch.clientX - this.lastTouch.x;
                        const dy = touch.clientY - this.lastTouch.y;
                        this.lastTouch = { x: touch.clientX, y: touch.clientY };

                        this.targetMouse.x = Math.max(-this.config.maxPanX, Math.min(this.config.maxPanX, this.targetMouse.x - dx * 0.35));
                        this.targetMouse.y = Math.max(-this.config.maxPanY, Math.min(this.config.maxPanY, this.targetMouse.y - dy * 0.35));

                    }, { passive: false });

                    this.container.addEventListener('touchend', () => { this.lastTouch = null; });
                }

                if (this.config.enableClickFX) {
                    this.container.addEventListener('pointerdown', (event) => {
                        this.triggerGlitch(event.clientX, event.clientY);
                    });
                }
            }

            animate() {
                requestAnimationFrame(this.animate);

                const elapsed = this.clock.getElapsedTime();
                const delta = elapsed - this.prevTime;
                this.prevTime = elapsed;
                this.material.uniforms.uTime.value = elapsed;

                // Glitch decay
                if (this.glitchStrength > 0.0) {
                    this.glitchStrength = Math.max(0.0, this.glitchStrength - delta * 2.2);
                    this.material.uniforms.uGlitch.value = this.glitchStrength;
                }

                // --- V5.0 SMOOTH FOV INTERPOLATION ---
                if (Math.abs(this.camera.fov - this.targetFOV) > 0.1) {
                    this.camera.fov += (this.targetFOV - this.camera.fov) * 0.12;
                    this.camera.updateProjectionMatrix();
                }

                // Smooth camera sway
                this.mouse.x += (this.targetMouse.x - this.mouse.x) * 0.05;
                this.mouse.y += (this.targetMouse.y - this.mouse.y) * 0.05;

                this.camera.position.x = this.mouse.x;
                this.camera.position.y = -this.mouse.y;

                this.camera.lookAt(this.scene.position);

                this.composer.render();
            }
        }

        setTimeout(() => {
            const boot = document.getElementById('boot-sequence');
            if (boot) { boot.style.opacity = 0; setTimeout(() => boot.remove(), 300); }
        }, 1200);

        // --- CONFIG V6.0  ---
        new MatrixRain('matrix1', {
            // --- LAYER
            layers: 8, // Max 11
            volumeHeight: 1200,
            frontLayerSize: 250,
            sizeRatio: 0.6,
            frontOpacity: 0.2,
            // --- TAIL
            matrixColor: 0x19e88e, // ghost white "#3ff3ee3" , flash green 0x00ff44 , blue 0x0088ff, purple 0x6600cc, ice 0xee0f0, matrix green 0x00ff64
            tailLength: 18,
            tailParallax: 0.4,
            tailFade: 0.7,
            charRerollRate: 1.0,
            // --- DROP SPEED
            baseDropSpeed: 280,
            speedParallax: 45,
            // --- BLOOM
            bloomStrength: 2,
            bloomRadius: 0.4,
            bloomThreshold: 0.15,
            bloomGradientSize: 0.55,
            // --- MATRIX ERRORS
            errorRate: 0.001,
            errorRateGlitchingChar: 0.5,
            partialErrorRate: 0.01,
            partialErrorSize: 0.4,
            errorColor: 0xff0000,
            // --- DECRYPT HEAD
            decryptColor: 0x3ff3ee3,
            decryptStrength: 1.1,
            decryptMix: 0.8,
            decryptFlashSize: 0.2,
            decryptScrambleSize: 1.2,
            // --- DESTRUCT TAIL
            destructColor: 0xffffff,
            destructStrength: 1.8,
            destructMix: 0.8,
            destructFlashSize: 1.5,
            destructAlphaBoost: 0.8,
            // --- RAIN DENSITY
            layerRainPerc: 0.7,
            layerDensityRamp: 1,
            repulsionRadius: 20,
            repulsionDepth: 2.5,
        });

    </script>
</body>
